name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --filter=@nestjs-modules/ioredis

      - name: Test
        run: pnpm run test --filter=@nestjs-modules/ioredis

      - name: Auto-create changeset if source code changed
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # 1) Skip if this is a merge from changeset-release branch.
          #    When the version PR is merged, we need changesets/action to PUBLISH,
          #    not create another changeset/PR (which causes infinite loops).
          if echo "$COMMIT_MSG" | grep -q "changeset-release/main"; then
            echo "⏭️ Skipping: changeset release PR was just merged → letting changesets/action publish"
            exit 0
          fi

          # 2) Skip if this is a direct chore(release) commit
          if echo "$COMMIT_MSG" | grep -q "^chore(release)"; then
            echo "⏭️ Skipping: this is a changesets version commit"
            exit 0
          fi

          # 3) Skip if changesets already exist (manually created)
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)
          if [ -n "$CHANGESETS" ]; then
            echo "⏭️ Skipping: changesets already exist"
            exit 0
          fi

          # 4) Skip if package version is already ahead of latest tag
          #    (version was already bumped by a previous changeset version step)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            TAG_VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
            PKG_VERSION=$(node -p "require('./packages/ioredis/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "⏭️ Skipping: package version ($PKG_VERSION) differs from latest tag ($TAG_VERSION) → version already bumped"
              exit 0
            fi
          fi

          # 5) Check if there are actual changes in packages/ since last tag
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- packages/ | head -1)
          else
            CHANGES="first-release"
          fi

          if [ -z "$CHANGES" ]; then
            echo "⏭️ No source changes detected, skipping changeset creation"
            exit 0
          fi

          echo "✅ Source changes detected, determining version bump..."

          # Analyze commits since last tag to determine bump type
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=%s -- packages/)
            BODIES=$(git log "$LAST_TAG"..HEAD --pretty=%b -- packages/)
          else
            COMMITS=$(git log --pretty=%s -- packages/)
            BODIES=$(git log --pretty=%b -- packages/)
          fi

          BUMP="patch"

          # Check for minor: feat(...) or feat:
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Check for major: breaking change convention (! before :) or BREAKING CHANGE in body
          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.*\))?!:"; then
            BUMP="major"
          fi
          if echo "$BODIES" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          fi

          echo "📦 Detected bump type: $BUMP"

          # Generate summary from conventional commits
          SUMMARY=""
          if [ -n "$LAST_TAG" ]; then
            FEAT_COMMITS=$(git log "$LAST_TAG"..HEAD --pretty="- %s" -- packages/ | grep -iE "^- feat" || true)
            FIX_COMMITS=$(git log "$LAST_TAG"..HEAD --pretty="- %s" -- packages/ | grep -iE "^- fix" || true)
            OTHER_COMMITS=$(git log "$LAST_TAG"..HEAD --pretty="- %s" -- packages/ | grep -viE "^- (feat|fix|chore\(release\)|Merge)" || true)
          else
            FEAT_COMMITS=$(git log --pretty="- %s" -- packages/ | grep -iE "^- feat" || true)
            FIX_COMMITS=$(git log --pretty="- %s" -- packages/ | grep -iE "^- fix" || true)
            OTHER_COMMITS=$(git log --pretty="- %s" -- packages/ | grep -viE "^- (feat|fix|chore\(release\)|Merge)" || true)
          fi

          if [ -n "$FEAT_COMMITS" ]; then
            SUMMARY="${SUMMARY}\n### Features\n${FEAT_COMMITS}\n"
          fi
          if [ -n "$FIX_COMMITS" ]; then
            SUMMARY="${SUMMARY}\n### Bug Fixes\n${FIX_COMMITS}\n"
          fi
          if [ -n "$OTHER_COMMITS" ]; then
            SUMMARY="${SUMMARY}\n### Other Changes\n${OTHER_COMMITS}\n"
          fi

          if [ -z "$SUMMARY" ]; then
            SUMMARY="Release ${BUMP} version with latest changes."
          fi

          {
            echo "---"
            echo "'@nestjs-modules/ioredis': ${BUMP}"
            echo "---"
            echo ""
            echo -e "$SUMMARY"
          } > .changeset/auto-release.md

          echo "Generated changeset:"
          cat .changeset/auto-release.md

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release with tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            TAG="v${VERSION}"

            echo "Creating tag and release for ${NAME}@${VERSION} → ${TAG}"

            # Create annotated tag
            git tag -a "$TAG" -m "Release ${NAME}@${VERSION}" 2>/dev/null || {
              echo "Tag $TAG already exists, skipping tag creation"
            }
            git push origin "$TAG" 2>/dev/null || {
              echo "Tag $TAG already pushed"
            }

            # Determine pre-release flag
            PRERELEASE_FLAG=""
            if echo "$VERSION" | grep -qE "(alpha|beta|rc|canary)"; then
              PRERELEASE_FLAG="--prerelease"
            fi

            # Determine previous tag for release notes
            PREV_TAG=$(git tag --sort=-version:refname | grep -E "^v[0-9]" | grep -v "$TAG" | head -1 || true)

            NOTES_FLAG="--generate-notes"
            if [ -n "$PREV_TAG" ]; then
              NOTES_FLAG="--generate-notes --notes-start-tag $PREV_TAG"
            fi

            # Create GitHub Release
            gh release create "$TAG" \
              --title "${NAME}@${VERSION}" \
              $NOTES_FLAG \
              $PRERELEASE_FLAG \
              --latest || echo "Release $TAG already exists, skipping"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
